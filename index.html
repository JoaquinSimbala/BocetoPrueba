<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Camara</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="title-bar">
        <h1>ECOLENS</h1>
      </div>

      <section class="viewer" aria-label="Vista de camara">
        <video id="video" autoplay muted playsinline></video>
        <div id="status" class="status">Solicitando cámara...</div>
        <div id="overlay" class="overlay processing" aria-hidden="true"></div>
      </section>

      <section class="action-row" aria-label="Controles principales">
        <button id="infoBtn" type="button" class="icon-btn" aria-label="Abrir información">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2Zm0 4.2a1.35 1.35 0 1 1-1.35 1.35A1.35 1.35 0 0 1 12 6.2Zm1.5 11.3h-3a1 1 0 0 1 0-2h1V12h-.75a1 1 0 0 1 0-2H12a1 1 0 0 1 1 1v4.5h.5a1 1 0 0 1 0 2Z"/>
          </svg>
        </button>

        <button id="simulateBtn" type="button" disabled class="icon-btn icon-btn--main" aria-label="Analizar con IA" title="Analizar">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M9 4.5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1V6h2.5A2.5 2.5 0 0 1 20 8.5v8a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 16.5v-8A2.5 2.5 0 0 1 6.5 6H9V4.5Zm3 3A5 5 0 1 0 17 12.5 5 5 0 0 0 12 7.5Zm0 2a3 3 0 1 1-3 3 3 3 0 0 1 3-3Z"/>
          </svg>
        </button>

        <button id="flipBtn" type="button" class="icon-btn" aria-label="Voltear cámara">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M7 5h9a3 3 0 0 1 3 3v3a1 1 0 0 1-2 0V8a1 1 0 0 0-1-1H7.4l1.3 1.3a1 1 0 0 1-1.4 1.4l-3-3a1 1 0 0 1 0-1.4l3-3a1 1 0 0 1 1.4 1.4Zm10 14H8a3 3 0 0 1-3-3v-3a1 1 0 1 1 2 0v3a1 1 0 0 0 1 1h8.6l-1.3-1.3a1 1 0 1 1 1.4-1.4l3 3a1 1 0 0 1 0 1.4l-3 3a1 1 0 0 1-1.4-1.4Z"/>
          </svg>
        </button>
      </section>

      <section class="alert-section" aria-live="assertive">
        <p id="alert" class="alert"></p>
      </section>

      <div id="infoModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-card">
          <div class="modal-header">
            <h2 id="modalTitle">Información del análisis</h2>
            <button id="closeModalBtn" type="button" class="modal-close" aria-label="Cerrar información">×</button>
          </div>

          <div class="info-group">
            <label>Estado</label>
            <p id="modelInfo" class="model-info">Modelo: cargando...</p>
          </div>

          <div class="info-group">
            <label>Predicción</label>
            <p id="prediction" class="prediction-text">--</p>
          </div>

          <div class="info-group">
            <label>Reciclable</label>
            <p id="recyclableResult" class="recyclable-text">No</p>
          </div>
        </div>
      </div>

      <video id="videoHidden" class="hidden-video" autoplay muted playsinline></video>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
